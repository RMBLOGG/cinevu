{% extends "base.html" %}
{% block title %}My List — Cinevu{% endblock %}
{% block content %}
<div class="list-wrap">
  <div class="list-heading">My List</div>
  <div id="wl-grid" class="grid-movies"></div>
  <div id="wl-empty" style="display:none;">
    <div style="text-align:center;padding:60px 0;">
      <div style="font-size:52px;margin-bottom:16px;opacity:.3;">🎬</div>
      <div style="font-family:var(--display);font-size:24px;letter-spacing:2px;margin-bottom:10px;">LIST KOSONG</div>
      <div style="color:var(--muted);font-size:14px;margin-bottom:24px;">Tambahkan film ke My List dari halaman utama</div>
      <a href="/" style="display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;text-decoration:none;padding:12px 28px;border-radius:6px;font-weight:700;font-size:14px;letter-spacing:.5px;"><i class="fa-solid fa-house"></i> Jelajahi Film</a>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const list = wlGet();
  const grid = document.getElementById('wl-grid');
  const empty = document.getElementById('wl-empty');
  if (!list.length) { grid.style.display='none'; empty.style.display='block'; return; }
  grid.innerHTML = list.map((m, i) => `
    <a href="/watch?url=${encodeURIComponent(m.url)}" class="ncard fade-in" style="width:100%;animation-delay:${i*0.02}s">
      <div class="ncard-poster-wrap">
        <img class="ncard-img" src="${m.poster || ''}" alt="${m.title}" loading="lazy"
             onerror="this.src='https://placehold.co/165x245/1a1a24/333?text=No+Image'">
        ${m.quality ? `<div class="ncard-badge">${m.quality}</div>` : ''}
        ${m.rating ? `<div class="ncard-star"><i class="fa-solid fa-star" style="font-size:8px;"></i> ${m.rating}</div>` : ''}
        <div class="ncard-overlay">
          <div class="ncard-overlay-play"><i class="fa-solid fa-play"></i></div>
          <div class="ncard-overlay-title">${m.title}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
            <button onclick="event.preventDefault();wlRemove('${m.url}')" style="background:rgba(232,0,29,.2);border:1px solid rgba(232,0,29,.4);color:var(--red);padding:5px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);">Hapus</button>
          </div>
        </div>
      </div>
      <div class="ncard-foot">
        <div class="ncard-foot-title">${m.title}</div>
        <div class="ncard-foot-meta">${m.quality ? `<span class="ncard-foot-hd">${m.quality}</span>` : ''}</div>
      </div>
    </a>
  `).join('');
});
function wlRemove(url) {
  const list = wlGet().filter(i => i.url !== url);
  localStorage.setItem('cinevu_watchlist', JSON.stringify(list));
  location.reload();
}
</script>
{% endblock %}
