<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — Cinevu</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#e5173f;--red-glow:rgba(229,23,63,0.25);--bg:#0b0d14;--surface:#131620;--surface2:#181c28;--surface3:#1e2334;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);--muted2:#6b7494;--text:#dde2f0;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  min-height:100vh;display:flex;
}
/* Side decoration */
.login-deco{
  flex:1;
  background:linear-gradient(135deg,#0d1020 0%,#130a18 50%,#0b0d14 100%);
  display:flex;align-items:center;justify-content:center;
  padding:40px;position:relative;overflow:hidden;
}
.login-deco::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 60%, rgba(229,23,63,0.12) 0%, transparent 60%),
             radial-gradient(ellipse at 70% 30%, rgba(91,141,239,0.08) 0%, transparent 50%);
}
/* dot grid */
.login-deco::after{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size:28px 28px;
}
.deco-content{position:relative;z-index:1;text-align:center;}
.deco-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--red),#8b0e23);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 40px var(--red-glow);}
.deco-logo i{font-size:28px;color:#fff;}
.deco-title{font-size:32px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#fff,#8b93b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.deco-sub{font-size:14px;color:var(--muted2);margin-top:10px;line-height:1.6;}
.deco-chips{display:flex;gap:8px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
.deco-chip{font-size:11px;font-weight:600;color:var(--muted2);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.deco-chip i{color:var(--red);}

/* Login form side */
.login-form-side{
  width:420px;min-height:100vh;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  padding:40px 36px;
}
.login-box{width:100%;max-width:340px;}
.login-box h2{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
.login-box p{font-size:13px;color:var(--muted2);margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-group label{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--muted2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.input-wrap{position:relative;}
.input-wrap i.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted2);pointer-events:none;}
.form-group input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;padding:12px 14px 12px 40px;border-radius:10px;outline:none;transition:border-color .2s;}
.form-group input:focus{border-color:var(--red);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--red),#b5102d);color:#fff;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;padding:13px;border-radius:10px;cursor:pointer;margin-top:8px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px var(--red-glow);}
.btn-login:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 28px var(--red-glow);}
.error-msg{background:rgba(229,23,63,.08);border:1px solid rgba(229,23,63,.2);color:#ff6b6b;font-size:12px;font-weight:600;padding:10px 14px;border-radius:9px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}

@media(max-width:700px){
  .login-deco{display:none;}
  .login-form-side{width:100%;border:none;}
}
</style>
</head>
<body>
<!-- Decoration Side -->
<div class="login-deco">
  <div class="deco-content">
    <div class="deco-logo"><i class="fa-solid fa-clapperboard"></i></div>
    <div class="deco-title">Cinevu Admin</div>
    <div class="deco-sub">Panel kontrol untuk mengelola<br>iklan dan permintaan platform</div>
    <div class="deco-chips">
      <div class="deco-chip"><i class="fa-solid fa-chart-pie"></i> Analytics</div>
      <div class="deco-chip"><i class="fa-solid fa-rectangle-ad"></i> Kelola Iklan</div>
      <div class="deco-chip"><i class="fa-solid fa-inbox"></i> Request</div>
    </div>
  </div>
</div>

<!-- Login Form Side -->
<div class="login-form-side">
  <div class="login-box">
    <h2>Selamat Datang</h2>
    <p>Masuk ke panel admin Cinevu</p>
    {% if error %}
    <div class="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label><i class="fa-solid fa-user"></i> Username</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" name="username" placeholder="admin" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-key"></i> Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-key input-icon"></i>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk ke Dashboard
      </button>
    </form>
  </div>
</div>
</body>
</html>
