<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — Cinevu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{width:100%;max-width:380px;padding:20px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo span{font-size:28px;font-weight:900;color:#e50914;letter-spacing:-1px;}
.login-logo p{font-size:12px;color:#555;margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.login-box{background:#111;border:1px solid #222;border-radius:14px;padding:32px 28px;}
.login-box h2{font-size:18px;font-weight:700;margin-bottom:24px;color:#fff;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#888;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;font-size:14px;padding:12px 14px;border-radius:8px;outline:none;transition:border-color .2s;}
.form-group input:focus{border-color:#e50914;}
.btn-login{width:100%;background:#e50914;color:#fff;border:none;font-size:14px;font-weight:700;padding:13px;border-radius:8px;cursor:pointer;margin-top:4px;transition:opacity .2s;}
.btn-login:hover{opacity:.88;}
.error-msg{background:rgba(229,9,20,.12);border:1px solid rgba(229,9,20,.3);color:#ff6b6b;font-size:13px;padding:10px 14px;border-radius:7px;margin-bottom:18px;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <span>Cinevu</span>
    <p>Admin Panel</p>
  </div>
  <div class="login-box">
    <h2>🔐 Masuk ke Dashboard</h2>
    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Masuk →</button>
    </form>
  </div>
</div>
</body>
</html>
