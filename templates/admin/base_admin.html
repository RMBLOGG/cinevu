<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Admin{% endblock %} — Cinevu</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#e50914;
  --red-glow:rgba(229,9,20,0.30);
  --bg:#070709;
  --surface:#0e0e12;
  --surface2:#13131a;
  --surface3:#1a1a24;
  --border:#1e1e2c;
  --border2:#28283a;
  --muted:#42425a;
  --muted2:#78789a;
  --text:#e6e6f0;
  --text-dim:#a8a8c0;
  --green:#22c55e;
  --yellow:#f59e0b;
  --blue:#6495ed;
  --nav-h:76px;
}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;padding-bottom:calc(var(--nav-h) + 24px);}

/* HEADER */
.adm-header{background:rgba(14,14,18,0.95);border-bottom:1px solid var(--border);padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);}
.adm-header-logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#e50914 0%,#ff5533 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.adm-header-title{font-size:12px;font-weight:600;color:var(--muted2);letter-spacing:0.4px;text-transform:uppercase;}
.adm-header-right a{font-size:11px;font-weight:600;color:var(--muted2);text-decoration:none;padding:6px 11px;background:var(--surface2);border-radius:8px;border:1px solid var(--border2);display:flex;align-items:center;gap:5px;transition:all .2s;}
.adm-header-right a:hover{color:var(--text);}

/* CONTENT */
.adm-content{padding:16px 16px;}

/* BOTTOM NAV — Pill Floating */
.adm-bottom-nav{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 28px);
  max-width:400px;
  height:60px;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:50px;
  display:flex;
  align-items:center;
  justify-content:space-around;
  z-index:100;
  box-shadow:0 10px 40px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.5);
  padding:0 6px;
}
.adm-bottom-nav a{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  color:var(--muted);
  text-decoration:none;
  font-size:9px;
  font-weight:600;
  letter-spacing:0.5px;
  text-transform:uppercase;
  padding:8px 4px;
  border-radius:40px;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.adm-bottom-nav a i{font-size:17px;transition:all .25s cubic-bezier(.34,1.56,.64,1);}
.adm-bottom-nav a:hover{color:var(--text-dim);}
.adm-bottom-nav a:hover i{transform:translateY(-2px);}
.adm-bottom-nav a.active{color:var(--red);}
.adm-bottom-nav a.active i{transform:translateY(-2px);}
.adm-bottom-nav a.active::after{content:'';position:absolute;bottom:5px;width:4px;height:4px;background:var(--red);border-radius:50%;}

/* Center raised button */
.adm-bottom-nav a.nav-center{
  flex:0 0 52px;width:52px;height:52px;
  background:linear-gradient(145deg,#ff1a1a,#c00710);
  border-radius:50%;color:#fff;
  box-shadow:0 4px 20px var(--red-glow),0 0 0 3px var(--surface2);
  margin-top:-18px;
  border:3px solid var(--surface2);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  gap:0;font-size:0;
}
.adm-bottom-nav a.nav-center i{font-size:19px;color:#fff;}
.adm-bottom-nav a.nav-center span{display:none;}
.adm-bottom-nav a.nav-center:hover{transform:scale(1.1) translateY(-2px);box-shadow:0 8px 28px var(--red-glow);}
.adm-bottom-nav a.nav-center.active{color:#fff;}
.adm-bottom-nav a.nav-center.active::after{display:none;}
.adm-bottom-nav a.nav-logout:hover{color:#ff6b6b;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 14px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;}
.stat-card:hover{transform:translateY(-1px);border-color:var(--border2);}
.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:0.05;}
.stat-card.c-white::after{background:#fff;}
.stat-card.c-yellow::after{background:var(--yellow);}
.stat-card.c-green::after{background:var(--green);}
.stat-card.c-red::after{background:var(--red);}
.stat-icon{font-size:18px;margin-bottom:8px;display:block;}
.stat-label{font-size:10px;font-weight:600;color:var(--muted2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-val{font-size:30px;font-weight:800;line-height:1;}
.stat-val.red{color:var(--red);}
.stat-val.green{color:var(--green);}
.stat-val.yellow{color:var(--yellow);}
.stat-val.white{color:var(--text);}

/* CARD LIST */
.card-list{display:flex;flex-direction:column;gap:10px;}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:border-color .2s;}
.item-card:hover{border-color:var(--border2);}
.item-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.item-card-title{font-size:14px;font-weight:700;color:var(--text);}
.item-card-sub{font-size:11px;color:var(--muted2);margin-top:2px;}
.item-card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.meta-chip{font-size:11px;color:var(--text-dim);background:var(--surface3);padding:3px 9px;border-radius:6px;border:1px solid var(--border);}
.meta-chip.yellow{color:var(--yellow);background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.15);}
.item-card-actions{display:flex;gap:6px;flex-wrap:wrap;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.badge-pending{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2);}
.badge-approved{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.badge-rejected{background:rgba(229,9,20,.1);color:#ff6b6b;border:1px solid rgba(229,9,20,.2);}
.badge-contacted{background:rgba(100,149,237,.1);color:var(--blue);border:1px solid rgba(100,149,237,.2);}
.badge-aktif{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.badge-nonaktif{background:rgba(100,100,120,.08);color:var(--muted2);border:1px solid var(--border);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;font-family:'Sora',sans-serif;padding:8px 13px;border-radius:9px;cursor:pointer;border:none;text-decoration:none;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--red);color:#fff;box-shadow:0 2px 10px var(--red-glow);}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);}
.btn-success{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.btn-success:hover{background:rgba(34,197,94,.18);}
.btn-danger{background:rgba(229,9,20,.08);color:#ff6b6b;border:1px solid rgba(229,9,20,.18);}
.btn-danger:hover{background:rgba(229,9,20,.16);}
.btn-ghost{background:var(--surface2);color:var(--muted2);border:1px solid var(--border2);}
.btn-ghost:hover{color:var(--text);}
.btn-info{background:rgba(100,149,237,.1);color:var(--blue);border:1px solid rgba(100,149,237,.2);}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px;}
.btn-full{width:100%;justify-content:center;}

/* SECTION */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.sec-title i{color:var(--red);font-size:13px;}
.sec-title-bar{display:flex;align-items:center;gap:10px;}
.sec-title-bar::before{content:'';display:block;width:3px;height:16px;background:var(--red);border-radius:2px;box-shadow:0 0 8px var(--red-glow);}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{background:var(--surface);border:1px solid var(--border);color:var(--muted2);font-size:11px;font-weight:600;font-family:'Sora',sans-serif;padding:6px 13px;border-radius:20px;text-decoration:none;white-space:nowrap;transition:all .2s;flex-shrink:0;display:flex;align-items:center;gap:5px;}
.filter-tab.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 10px var(--red-glow);}
.filter-tab:hover:not(.active){border-color:var(--border2);color:var(--text-dim);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface2);border:1px solid var(--border2);border-top:1px solid var(--border2);border-radius:22px 22px 0 0;width:100%;max-height:90vh;overflow-y:auto;}
.modal-head{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface2);z-index:1;padding-top:22px;}
.modal-head::before{content:'';display:block;width:40px;height:4px;background:var(--border2);border-radius:2px;position:absolute;top:10px;left:50%;transform:translateX(-50%);}
.modal-head h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.modal-head h3 i{color:var(--red);}
.modal-close{background:var(--surface3);border:none;color:var(--muted2);width:28px;height:28px;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:16px 20px 32px;}
.form-group{margin-bottom:14px;}
.form-group label{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group label i{font-size:10px;color:var(--muted);opacity:.8;}
.form-control{width:100%;background:var(--surface3);border:1px solid var(--border2);color:var(--text);font-family:'Sora',sans-serif;font-size:13px;padding:11px 13px;border-radius:10px;outline:none;transition:border-color .2s;}
.form-control:focus{border-color:var(--red);}
.form-control option{background:var(--surface2);}
textarea.form-control{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-hint{font-size:11px;color:var(--muted);margin-top:4px;}
.modal-footer{display:flex;gap:8px;margin-top:18px;}
.modal-footer .btn{flex:1;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + 20px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;padding:10px 18px;border-radius:12px;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap;display:flex;align-items:center;gap:7px;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:rgba(34,197,94,.3);color:var(--green);}
.toast.error{border-color:rgba(229,9,20,.3);color:#ff6b6b;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-state .empty-icon{font-size:38px;margin-bottom:12px;opacity:0.45;}
.empty-state p{font-size:13px;color:var(--muted2);}

/* FAB */
.fab{position:fixed;bottom:calc(var(--nav-h) + 16px);right:18px;background:linear-gradient(135deg,#e50914,#c00710);color:#fff;border:none;width:50px;height:50px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 22px var(--red-glow);z-index:90;transition:all .25s cubic-bezier(.34,1.56,.64,1);}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 30px var(--red-glow);}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

<div class="adm-header">
  <span class="adm-header-logo">Cinevu</span>
  <span class="adm-header-title">{% block page_title %}Admin{% endblock %}</span>
  <div class="adm-header-right">
    <a href="/" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> Site</a>
  </div>
</div>

<div class="adm-content">
  {% block content %}{% endblock %}
</div>

<!-- Floating Pill Bottom Nav -->
<nav class="adm-bottom-nav">
  <a href="/admin/dashboard" class="{% if active=='dashboard' %}active{% endif %}">
    <i class="fa-solid fa-chart-pie"></i>
    <span>Stats</span>
  </a>
  <a href="/admin/requests" class="{% if active=='requests' %}active{% endif %}">
    <i class="fa-solid fa-inbox"></i>
    <span>Request</span>
  </a>
  <!-- Center raised circle -->
  <a href="/admin/dashboard" class="nav-center">
    <i class="fa-solid fa-clapperboard"></i>
    <span>Home</span>
  </a>
  <a href="/admin/iklan" class="{% if active=='iklan' %}active{% endif %}">
    <i class="fa-solid fa-rectangle-ad"></i>
    <span>Iklan</span>
  </a>
  <a href="/admin/logout" class="nav-logout">
    <i class="fa-solid fa-right-from-bracket"></i>
    <span>Keluar</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  const icon = type === 'success' ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-xmark"></i>';
  t.innerHTML = `${icon} ${msg}`;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}
async function apiPost(url, data) {
  const r = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  return r.json();
}
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
