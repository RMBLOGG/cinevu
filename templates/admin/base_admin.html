<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Admin{% endblock %} — Cinevu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#e50914;--bg:#0a0a0a;--surface:#111;--surface2:#161616;--border:#1e1e1e;--muted:#555;--muted2:#888;}
body{background:var(--bg);color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;padding-bottom:70px;}

/* Top header */
.adm-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.adm-header-logo{font-size:18px;font-weight:900;color:var(--red);}
.adm-header-title{font-size:14px;font-weight:700;color:#fff;}
.adm-header-right a{font-size:12px;color:var(--muted2);text-decoration:none;padding:6px 12px;background:rgba(255,255,255,.05);border-radius:6px;border:1px solid var(--border);}

/* Content */
.adm-content{padding:16px;}

/* Bottom nav */
.adm-bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
.adm-bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;color:var(--muted2);text-decoration:none;font-size:10px;font-weight:600;transition:color .15s;}
.adm-bottom-nav a.active,.adm-bottom-nav a:hover{color:var(--red);}
.adm-bottom-nav a .nav-icon{font-size:20px;line-height:1;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-card .stat-label{font-size:11px;color:var(--muted2);margin-bottom:6px;}
.stat-card .stat-val{font-size:26px;font-weight:900;}
.stat-val.red{color:var(--red);}
.stat-val.green{color:#46d369;}
.stat-val.yellow{color:#f5c518;}
.stat-val.white{color:#fff;}

/* Card list (mobile-friendly rows) */
.card-list{display:flex;flex-direction:column;gap:10px;}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.item-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.item-card-title{font-size:14px;font-weight:700;color:#fff;}
.item-card-sub{font-size:12px;color:var(--muted2);margin-top:2px;}
.item-card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.meta-chip{font-size:11px;color:#aaa;background:rgba(255,255,255,.06);padding:3px 8px;border-radius:4px;}
.meta-chip.yellow{color:#f5c518;background:rgba(245,197,24,.08);}
.item-card-actions{display:flex;gap:7px;flex-wrap:wrap;}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-pending{background:rgba(245,197,24,.12);color:#f5c518;}
.badge-approved{background:rgba(70,211,105,.12);color:#46d369;}
.badge-rejected{background:rgba(229,9,20,.12);color:#ff6b6b;}
.badge-contacted{background:rgba(100,149,237,.12);color:#6495ed;}
.badge-aktif{background:rgba(70,211,105,.12);color:#46d369;}
.badge-nonaktif{background:rgba(100,100,100,.12);color:#888;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:7px 13px;border-radius:7px;cursor:pointer;border:none;text-decoration:none;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--red);color:#fff;}
.btn-primary:hover{opacity:.85;}
.btn-success{background:rgba(70,211,105,.12);color:#46d369;border:1px solid rgba(70,211,105,.2);}
.btn-danger{background:rgba(229,9,20,.1);color:#ff6b6b;border:1px solid rgba(229,9,20,.15);}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--muted2);border:1px solid var(--border);}
.btn-ghost:hover{color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-full{width:100%;justify-content:center;}

/* Section header */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:15px;font-weight:700;}

/* Filter tabs */
.filter-tabs{display:flex;gap:7px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.filter-tab{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted2);font-size:12px;font-weight:600;padding:6px 13px;border-radius:20px;text-decoration:none;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.filter-tab.active{background:var(--red);border-color:var(--red);color:#fff;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#161616;border:1px solid var(--border);border-radius:18px 18px 0 0;width:100%;max-height:90vh;overflow-y:auto;}
.modal-head{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#161616;z-index:1;padding-top:20px;}
.modal-head::before{content:'';display:block;width:36px;height:4px;background:#333;border-radius:2px;position:absolute;top:8px;left:50%;transform:translateX(-50%);}
.modal-head h3{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.modal-body{padding:16px 20px 32px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.form-control{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#fff;font-family:'Segoe UI',sans-serif;font-size:14px;padding:11px 13px;border-radius:8px;outline:none;transition:border-color .2s;}
.form-control:focus{border-color:var(--red);}
.form-control option{background:#1a1a1a;}
textarea.form-control{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-hint{font-size:11px;color:var(--muted);margin-top:4px;}
.modal-footer{display:flex;gap:8px;margin-top:18px;}
.modal-footer .btn{flex:1;justify-content:center;}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#222;border:1px solid #333;color:#fff;font-size:13px;font-weight:600;padding:11px 20px;border-radius:10px;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:rgba(70,211,105,.3);color:#46d369;}
.toast.error{border-color:rgba(229,9,20,.3);color:#ff6b6b;}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state .empty-icon{font-size:36px;margin-bottom:10px;}
.empty-state p{font-size:13px;}

/* FAB */
.fab{position:fixed;bottom:80px;right:16px;background:var(--red);color:#fff;border:none;width:52px;height:52px;border-radius:50%;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(229,9,20,.4);z-index:90;}
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

<div class="adm-header">
  <span class="adm-header-logo">Cinevu</span>
  <span class="adm-header-title">{% block page_title %}Admin{% endblock %}</span>
  <div class="adm-header-right"><a href="/" target="_blank">← Site</a></div>
</div>

<div class="adm-content">
  {% block content %}{% endblock %}
</div>

<nav class="adm-bottom-nav">
  <a href="/admin/dashboard" class="{% if active=='dashboard' %}active{% endif %}">
    <span class="nav-icon">📊</span>Dashboard
  </a>
  <a href="/admin/requests" class="{% if active=='requests' %}active{% endif %}">
    <span class="nav-icon">📨</span>Request
  </a>
  <a href="/admin/iklan" class="{% if active=='iklan' %}active{% endif %}">
    <span class="nav-icon">📢</span>Iklan
  </a>
  <a href="/admin/logout">
    <span class="nav-icon">🚪</span>Logout
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}
async function apiPost(url, data) {
  const r = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  return r.json();
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
// Close modal on overlay click
document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id);
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
